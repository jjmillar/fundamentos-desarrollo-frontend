<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Perfil del Estudiante</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="./jquery.js"></script>
        <link rel="stylesheet" href="./style.css">
    </head>

    <body>

        <nav class="navbar navbar-expand-lg navbar-light bg-light justify-content-center">

            <div class="container-fluid">

                <ul class="navbar-nav justify-content-center">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Perfil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Configuración</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Cerrar sesión</a>
                    </li>
                </ul>

            </div>

        </nav>

        <form class="container m-5 bg-lightblue rounded">

            <div class="mb-3 mt-3">
                <label for="name" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="form-name" placeholder="Nombre completo">
            </div>

            <div class="mb-3">
                <label for="age" class="form-label">Edad</label>
                <input type="number" class="form-control" id="form-age" placeholder="Tu edad">
            </div>

            <div class="mb-3 mt-3">
                <label for="carrer" class="form-label">Carrera</label>
                <input type="text" class="form-control" id="form-carrer" placeholder="Ingresa el nombre de tu carrera">
            </div>

            <button id="form-btn" type="submit" class="btn btn-primary">Guardar</button>

        </form>

        <section class="card mt-5 bg-lightblue">
            <div class="card-body">
                <img src="./assets/perfil.avif" alt="Foto de perfil" class="card-img-left">       
                <p id="profile-name card-title">nombre</p>
                <p id="profile-age card-text">edad</p>
                <p id="profile-carrer card-text">carrera</p>
            </div>
            
        </section>


    </body>

    <script>

        $("#form-btn").click(
            function () {
                event.preventDefault();
            
                let name = $('#form-name').val();
                $('#profile-name').text(name);

                let age = $('#form-age').val();
                $('#profile-age').text(`${age} años`);

                let carrer = $('#form-carrer').val();
                $('#profile-carrer').text(carrer);

                console.log(name, age, carrer);

                $("section").css("visibility", "visible");
            }
        );
            
    </script>

</html>
