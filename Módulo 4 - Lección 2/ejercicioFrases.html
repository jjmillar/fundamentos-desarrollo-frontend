<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Frases Motivadoras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
      
        .fondo-degradado {
            background: linear-gradient(135deg, #ba89dd 0%, #e24bb0 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="fondo-degradado d-flex align-items-center justify-content-center">

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="card shadow-lg border-0 p-5 bg-white rounded-4">
                    <span class="text-muted text-uppercase small fw-bold mb-3 d-block">Tu dosis de inspiración</span>
                    
                    <h2 id="elemento-frase" class="text-dark fw-normal my-4">
                        </h2>
                    
                    <div class="mx-auto bg-primary opacity-25" style="width: 50px; height: 3px;"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
      
        const frases = [
            "cria cuervos y tendrás muchos cuervos",
            "No dejes para hoy lo que puedas hacer mañana.",
            "al mal tiempo camaron que se duerme",
            "el que madruga despierta con mucho sueño"
        ];

        let indiceActual = 0;

        const elementoHtml = document.getElementById('elemento-frase');

       
        elementoHtml.textContent = frases[indiceActual];

        
        setInterval(function() {
            
            indiceActual++;

           
            if (indiceActual === frases.length) {
                indiceActual = 0;
            }

           
            elementoHtml.textContent = frases[indiceActual];

        }, 3000); 
    </script>

</body>
</html>
