<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayor de edad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-light text-dark">
    <div class="d-flex flex-column min-vh-100">
        <header class="py-5 border-bottom border-primary-subtle">
            <div class="container">
                <h1 class="display-5 fw-bold mb-3 text-primary">Es usted mayor de edad?</h1>
            </div>
        </header>

        <main class="flex-grow-1 py-5">
            <div class="container">
                <div class="row g-5">
                    <aside class="col-lg-4">
                        <div class="card border-info-subtle shadow-sm">
                            <div class="card-body">
                                <h6 class="text-uppercase text-primary fw-bold mb-4">Menú</h6>
                                <ul class="nav nav-pills flex-column gap-2">
                                    <li class="nav-item">
                                        <a href="./index.html" class="nav-link active bg-info text-dark fw-bold">Calculadora</a>
                                    </li>
                                </ul>
                                <div class="alert alert-info mt-4 mb-0" role="alert">
                                    <small class="d-block fw-bold mb-2">Tip rápido</small>
                                    <small>Ojo!!! No hay boton de calcular :B</small>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <section class="col-lg-8">
                        <div class="card border-info-subtle shadow-sm">
                            <div class="card-body p-5">

                                <div class="row mb-4 justify-items-center align-items-center g-4">

                                    <div class="col">
                                        <label for="DateOfBirth" class="fw-bold text-primary">Ingrese su fecha de nacimiento</label>
                                        <input type="date" id="DateOfBirth" class="form-control border-info" placeholder="Ingrese su fecha de nacimiento" oninput="operacion()">
                                    </div>

                                </div>

                                <div class="card bg-info-subtle border-info">
                                    <div id="boxResult" class="card-body text-center py-5">
                                        <h5 class="card-title text-uppercase fw-bold text-muted mb-3">Resultado</h5>
                                        <p id="resultado" class="fs-5 fw-bold mb-0 text-primary">Complete su fecha de nacimiento</p>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <footer class="py-4 border-top border-primary-subtle">
            <div class="container text-center text-muted">
                <small>Desarrollado por <b>JJ Studio</b></small>
            </div>
        </footer>
    </div>

    <script>

        function operacion() {

            // Calcular la mayoría de edad

            let birthDate = new Date(document.getElementById("DateOfBirth").value);
            let today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            
            if (age >= 18) {
                document.getElementById("resultado").textContent = `Eres mayor de edad: tu edad es ${age} años`;
                document.getElementById("boxResult").style.backgroundColor = "green";
            } else {
                document.getElementById("resultado").textContent = `Eres menor de edad: tu edad es ${age} años`;
                document.getElementById("boxResult").style.backgroundColor = "red";
            }

        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
