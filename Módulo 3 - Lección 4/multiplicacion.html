<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejemplo multiplicacion</title>
    </head>
    <body>
        <label for="num1">Numero 1:</label>
        <input type="number" id="num1" placeholder="Ingrese el primer numero"></input>
        <label for="num2">Numero 2:</label>
        <input type="number" id="num2" placeholder="Ingrese el segundo numero"></input>
        <button onclick="inicio(Number(document.getElementById('num1').value), Number(document.getElementById('num2').value));">
            Calcular
        </button>
        <p id="resultado"></p>
        <script>

            function inicio(num1, num2) {
                let res = 0;

                for (let i = 0; i < num2; i++) {
                    res += num1;
                    console.log(res);
                }
            }
        </script>
    </body>
</html>
