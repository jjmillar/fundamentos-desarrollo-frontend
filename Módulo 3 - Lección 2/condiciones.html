<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejemplo de condicionales</title>
    </head>
    <body>
        <button onclick="mayor();">Ejecutar</button>
        <script>
            function mayor() {
                const numero1 = 71, numero2 = 70;
                
                if (numero1>numero2){console.log("El primer numero es el mayor")}{return}
                if (numero1===numero2){console.log("Los numeros son iguales")} 
                    else {
                        console.log("El segundo numero es el mayor")
                    }
            }
        </script>
    </body>
</html>
