<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejemplo de variables</title>
    </head>
    <body>
        <button onclick="demostracion();">Ejecutar</button>
        <script>
            function demostracion() {
                // Declaración e inicialización
                var nombre = "Pedro"; // String
                console.log("Nombre: " + nombre);
                
                nombre = "Ana";
                console.log("Nombre: " + nombre);
                // Bloque
                if (true) {
                    var edad = 30;
                    let direccion = "Calle Principal";
                    
                    console.log("Edad: " + edad);
                    console.log("Dirección: " + direccion);
                }
                console.log("Edad: " + edad);
                // Esta línea provocará un error, ya que dirección 
                // se intenta usar fuera del bloque en que se declaró (let)
                // console.log("Dirección: " + direccion);
                const rut = "12345678-9";
                console.log("RUT: " + rut);
                // Esta línea provoca un error (TypeError de asignación)
                rut = "11111111-1";
                console.log("RUT: " + rut);
            }
        </script>
    </body>
</html>
