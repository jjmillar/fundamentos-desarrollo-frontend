<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Entradas concierto - Promesa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card-promesa {
            border-right: 8px solid #ffc107;
        }
    </style>
</head>

<body>

    <main class="container min-vh-100 d-flex justify-content-center align-items-center">

        <div class="card shadow card-promesa" style="width: 30rem;">
            <div class="card-body text-center">

                <h1 class="card-title mb-4">🎫 Venta de Entradas</h1>

                <p class="card-text">
                    Presiona el botón para procesar la compra de tu entrada.
                </p>

                <button class="btn btn-primary" onclick="comprar();">
                    Comprar Entrada
                </button>

                <hr>

                <p id="mensaje" class="fw-bold fs-5"></p>

            </div>
        </div>

    </main>

    <script>

        function comprar() {

            document.getElementById("mensaje").textContent = "Procesando pago...";

            let promise = new Promise(function (resolve, reject) {

                setTimeout(function () {

                    let resultado = Math.random();

                    if (resultado >= 0.5) {
                        resolve("Entrada comprada correctamente");
                    } else {
                        reject("Error en el pago");
                    }

                }, 3000);

            });

            promise.then(function (mensaje) {

                document.getElementById("mensaje").textContent = mensaje;

            })

            .catch(function (error) {

                document.getElementById("mensaje").textContent = error;

            });

        }

    </script>

</body>

</html>
