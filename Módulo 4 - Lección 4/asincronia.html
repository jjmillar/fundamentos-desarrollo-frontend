<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Callbacks en JavaScript</title>
    </head>
    <body>
        <h1>Ejercicio de Callbacks</h1>
        <button onclick="uno();">Ejecutar</button>
        <script>
            function dos() {
                setTimeout(function() {
                    console.log("Dos");
                }, 1000);
            }
            function uno() {
                setTimeout(function() {
                    console.log("Uno");
                }, 0);
                dos();
                console.log("Tres");
            }
            
        </script>
    </body>
</html>
