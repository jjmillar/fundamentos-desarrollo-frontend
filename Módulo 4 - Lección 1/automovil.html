<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automóvil</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <div class="card card-body shadow mx-auto" style="max-width: 25rem">
        <h3 id="velocidad" class="text-center mb-4">Velocidad: 0 Km/h</h3>

        <input type="number" id="cantidad" class="form-control mb-3" />

        <div class="d-flex gap-3">
          <button class="btn btn-success flex-fill" onclick="acelerar()">
            Acelerar
          </button>

          <button class="btn btn-danger flex-fill" onclick="frenar()">
            Frenar
          </button>
        </div>
      </div>
    </div>

    <script src="./js/automovil.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
