<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Mi primera página con Javascript</title>
        <script src="./assets/js/app.js"></script>
    </head>
    <body style="height: 200svh;">
        <h1>Suma</h1>
        <input type="number" placeholder="Ingrese el primer número" id="numero1">
        <input type="number" placeholder="Ingrese el segundo número" id="numero2">
        <p id="resultado">Resultado</p>
        <button onclick="sumar();">Sumar</button>
        <button onclick="restar();">Restar</button>
        <button onclick="multiplicar();">Multiplicar</button>
        <button onclick="dividir();">Dividir</button>
        <button onclick="smooth_scroll_top()" style="position:fixed; bottom: 0; left: 0;">Subir</button>
        <script>


            function sumar() {           
                
                let A = Number(document.getElementById("numero1").value);
                let B = Number(document.getElementById("numero2").value);    
                //Realizo la operación aritmética
                let resultado = A + B;
                //Muestro el resultado
                alert(resultado);
                document.getElementById("resultado").innerHTML = resultado;       

                console.log(A);
                console.log(B);     
            }

            function restar() {

                let A = Number(document.getElementById("numero1").value);
                let B = Number(document.getElementById("numero2").value);  
                //Realizo la operación aritmética
                let resultado = A - B;
                //Muestro el resultado
                alert(resultado);
                document.getElementById("resultado").innerHTML = resultado;       

                console.log(A);
                console.log(B);   
            }

            function multiplicar() {

                let A = Number(document.getElementById("numero1").value);
                let B = Number(document.getElementById("numero2").value);   
                //Realizo la operación aritmética
                let resultado = A * B;
                //Muestro el resultado
                alert(resultado);
                document.getElementById("resultado").innerHTML = resultado;       

                console.log(A);
                console.log(B);   
            }

            function dividir() {

                let A = Number(document.getElementById("numero1").value);
                let B = Number(document.getElementById("numero2").value);  
                //Realizo la operación aritmética
                let resultado = A / B;
                //Muestro el resultado
                alert(resultado);
                document.getElementById("resultado").innerHTML = resultado;       powe

                console.log(A);
                console.log(B);   
            }

        </script>
    </body>
</html>
