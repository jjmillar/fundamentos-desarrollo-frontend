<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejemplo de condicionales</title>
    </head>
    <body>
        <button onclick="mayor();">Ejecutar</button>
        <script>

            function mayor() {

                const num1 = 10, num2 = 50, num3 = 100;
                
                if (num1 > num2 && num1 > num3) { console.log("El primer número es el mayor"); return }
                if (num2 > num1 && num2 > num3) { console.log("El segundo número es el mayor"); return }
                if (num3 > num1 && num3 > num2) { console.log("El tercer número es el mayor"); return }

            }
        </script>
    </body>
</html>
