<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <title>Ejemplo de contador</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <nav class="navbar bg-light navbar-light">
            <h1 class="m-3">Simulación bancaria</h1>
        </nav>
        <main class="p-3">
            <div class="row">
                <div class="col-12">
                    <input type="number" id="deposito" placeholder="Ingrese monto" value="0" class="form-control">
                    <button onclick="depositar();" class="btn btn-primary">Depositar</button>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <input type="number" id="giro" placeholder="Ingrese monto" value="0" class="form-control">
                    <button onclick="girar();"  class="btn btn-primary">Girar</button>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <h2><span>Saldo: </span><span id="saldo">0</span></h2>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-12">
                    <h3 id="mensaje"></h3>
                </div>
            </div>
        </main>
        <script>
            // Declaro e inicializo la variable global
            let saldo = 0;
            function depositar() {
                let monto = Number(document.getElementById("deposito").value);
                // Actualizo el valor de la variable global
                saldo += monto;
                mostrar_mensaje("Depósito exitoso");
                mostrar_saldo();
                limpiar_caja("deposito");
            }
            function girar() {
                let monto = Number(document.getElementById("giro").value);
                if (monto <= saldo) {
                    // Actualizo el valor de la variable global
                    saldo -= monto;
                    mostrar_mensaje("Giro exitoso");
                    mostrar_saldo();
                    limpiar_caja("giro");
                } else {
                    mostrar_mensaje("No tiene saldo suficiente");
                }
            }
            function mostrar_saldo() {
                document.getElementById("saldo").textContent = saldo;
            }
            function mostrar_mensaje(mensaje) {
                document.getElementById("mensaje").textContent = mensaje;
            }
            
            function limpiar_caja(caja) {
                document.getElementById(caja).value = 0;
            }
            
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
